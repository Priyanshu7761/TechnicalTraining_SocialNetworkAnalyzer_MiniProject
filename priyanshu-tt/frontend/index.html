<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌐 Social Network Analyzer</h1>
        <p class="subtitle">Graph-based social network using BFS & DFS</p>

        <div class="section">
            <h2>Add User</h2>
            <div class="form-group">
                <input type="text" id="newUser" placeholder="Enter username">
                <button onclick="addUser()">Add User</button>
            </div>
        </div>

        <div class="section">
            <h2>Add Friendship</h2>
            <div class="form-group">
                <input type="text" id="user1" placeholder="User 1">
                <input type="text" id="user2" placeholder="User 2">
                <button onclick="addFriendship()">Add Friendship</button>
            </div>
        </div>

        <div class="section">
            <h2>Get Friends List</h2>
            <div class="form-group">
                <input type="text" id="userForFriends" placeholder="Enter username">
                <button onclick="getFriends()">Show Friends</button>
            </div>
        </div>

        <div class="section">
            <h2>Find Mutual Friends</h2>
            <div class="form-group">
                <input type="text" id="mutualUser1" placeholder="User 1">
                <input type="text" id="mutualUser2" placeholder="User 2">
                <button onclick="getMutualFriends()">Find Mutual Friends</button>
            </div>
        </div>

        <div class="section">
            <h2>Shortest Path (BFS)</h2>
            <div class="form-group">
                <input type="text" id="pathUser1" placeholder="Start User">
                <input type="text" id="pathUser2" placeholder="End User">
                <button onclick="getShortestPath()">Find Shortest Path</button>
            </div>
        </div>

        <div id="result" class="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
